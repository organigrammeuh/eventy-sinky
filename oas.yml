openapi: 3.1.0
info:
  title: EventSync API
  description: |
    API for the EventSync platform - Real-time event management and participant engagement.
    
    **Roles:**
    - **Admin (Organizer)**: Full CRUD on events, sessions, speakers (requires authentication)
    - **Public (Participant)**: Read events, sessions, submit/upvote questions during live sessions, manage personal favorites (local storage)
    - **Speaker**: Public read-only access to their profile and related sessions/questions
  version: 1.0.0
  contact:
    name: EventSync Team
    url: https://sitraka.notion.site/EventSync-3454e032adad807daf62

servers:
  - url: http://localhost:3000/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token required for admin (organizer) operations

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    EventCreation:
      type: object
      required:
        - title
        - startDate
        - endDate
        - location
        - description
      properties:
        title:
          type: string
          example: "Conférence Tech Madagascar 2026"
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
          example: "Hôtel Carlton, Antananarivo"
        
    Event:
      allOf:
        - $ref: '#/components/schemas/EventCreation'
        - type: object
          properties:
            id: 
              type: string
              format: uuid
            sessions:
              type: array
              items:
                $ref: '#/components/schemas/SessionCreation'

    SessionCreation:
      type: object
      required:
        - title
        - startTime
        - endTime
        - eventId
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        room:
          type: string
          example: "Salle A"
        capacity:
          type: integer
          description: Informative only (not enforced)

    Session:
      allOf:
        - $ref: '#/components/schemas/SessionCreation'
        - type: object
          properties:
            id: 
              type: string
              format: uuid
            eventId:
              type: string
              format: uuid
            speakers:
              type: array
              items:
                $ref: '#/components/schemas/Speaker'
            question:
              type: array
              items:
                $ref: '#/components/schemas/Question'

    SpeakerCreation:
      type: object
      required:
        - fullName
      properties:
        fullName:
          type: string
        profilePicture:
          type: string
          format: uri
        bio:
          type: string
        socialLinks:
          type: array
          items:
            type: string

    Speaker: 
      allOf:
        - $ref: '#/components/schemas/SpeakerCreation'
        - type: object
          properties:
            id: 
              type: string
              format: uuid
            sessions:
              $ref: '#/components/schemas/Session'

    RoomCreation:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Salle A"

    Room:
      allOf:
        - $ref: '#/components/schemas/RoomCreation'
        - type: object
          properties:
            id:
              type: string
              format: uuid

    QuestionCreation:
      type: object
      required:
        - content
        - sessionId
      properties:
        content:
          type: string
        name:
          type: string
          description: Optional name (allows anonymity)

        sessionId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Question: 
      allOf:
        - $ref: '#/components/schemas/QuestionCreation'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            upvotes:
              type: integer
              default: 0
paths:

  # ====================== EVENTS ======================
  /events:
    get:
      tags:
        - Events
      summary: List all events
      description: Public endpoint - Get list of all published events
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

    post:
      tags:
        - Admin - Events
      summary: Create a new event
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreation'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

  /events/{eventId}:
    get:
      tags:
        - Events
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

    put:
      tags:
        - Admin - Events
      summary: Update an event
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreation'
      responses:
        '200':
          description: Event updated

    delete:
      tags:
        - Admin - Events
      summary: Delete an event
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event deleted

  # ====================== SESSIONS ======================
  /events/{eventId}/sessions:
    get:
      tags:
        - Sessions
      summary: Get all sessions for an event (multi-track planning)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

    post:
      tags:
        - Admin - Sessions
      summary: Create a session
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreation'
      responses:
        '201':
          description: Session created

  /events/{eventId}/sessions/{sessionId}:
    patch:
      tags:
        - Admin - Sessions
      summary: Update a session
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreation'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{sessionId}:
    get:
      tags:
        - Sessions
      summary: Get detailed session information
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session details including speakers and questions section
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'

  /events/{eventId}/sessions/{sessionId}/speakers/{speakerId}/associate:
    patch:
      tags:
        - Admin - Sessions
      summary: Associate a speaker to a session
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: speakerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Speaker associated successfully
        '404':
          description: Session or speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Speaker already associated to this session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{eventId}/sessions/{sessionId}/speakers/{speakerId}/dissociate:
    patch:
      tags:
        - Admin - Sessions
      summary: Dissociate a speaker from a session
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: speakerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Speaker dissociated successfully
        '404':
          description: Session or speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Speaker not associated to this session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ====================== LIVE SESSIONS & QUESTIONS ======================
  /sessions/{sessionId}/questions:
    get:
      tags:
        - Questions
      summary: Get questions for a session (sorted by upvotes descending)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Question'

    post:
      tags:
        - Questions
      summary: Submit a new question (only during live session)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionCreation'
      responses:
        '201':
          description: Question submitted successfully

  /questions/{questionId}/upvote:
    post:
      tags:
        - Questions
      summary: Upvote a question
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Upvote registered

  # ====================== SPEAKERS ======================
  /speakers:
    get:
      tags:
        - Speakers
      summary: List all speakers
      responses:
        '200':
          description: List of speakers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Speaker'

    post:
      tags:
        - Admin - Speakers
      summary: Create a new speaker
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerCreation'
      responses:
        '201':
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'

  /speakers/{speakerId}:
    get:
      tags:
        - Speakers
      summary: Get speaker public profile
      parameters:
        - name: speakerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Speaker profile with associated sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'

    put:
      tags:
        - Admin - Speakers
      summary: Update a speaker
      security:
        - BearerAuth: []
      parameters:
        - name: speakerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerCreation'
      responses:
        '200':
          description: Speaker updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '404':
          description: Speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Admin - Speakers
      summary: Delete a speaker
      security:
        - BearerAuth: []
      parameters:
        - name: speakerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Speaker deleted
        '404':
          description: Speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ====================== ROOMS ======================
  /rooms:
    get:
      tags:
        - Rooms
      summary: List all rooms
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'

    post:
      tags:
        - Admin - Rooms
      summary: Create a new room
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreation'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'

  /rooms/{roomId}/sessions:
    get:
      tags:
        - Sessions
      summary: Get sessions for a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of sessions in the room
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
tags:
  - name: Events
    description: Public event consultation
  - name: Sessions
    description: Session management and planning
  - name: Questions
    description: Live Q&A system
  - name: Speakers
    description: Speaker profiles
  - name: Rooms
    description: Room/venue management
  - name: Admin - Events
    description: Admin operations on events
  - name: Admin - Sessions
    description: Admin operations on sessions
  - name: Admin - Speakers
    description: Admin operations on speakers
  - name: Admin - Rooms
    description: Admin operations on rooms
  - name: Favorites
    description: Personal itinerary

security:
  - BearerAuth: []